<p>note-list works!</p>
<ul>
@for (note of notes; track note; let idx = $index) {
    <li>
        <div class="note-item">
            <summary>{{note.date}}</summary>
            <p>{{note.content}}</p>
            <button (click)="deleteNote(idx)">Delete Note</button>
        </div>
    </li>
}
</ul>
